import Image from "next/image";
import { BRAND } from "../../config/brand";

type BrandLogoProps = {
  width?: number;
  height?: number;
  priority?: boolean;
  className?: string;
};

export function BrandLogo({
  width = 190,
  height = 52,
  priority = false,
  className,
}: BrandLogoProps) {
  return (
    <Image
      src={BRAND.logoPath}
      alt={BRAND.name}
      width={width}
      height={height}
      priority={priority}
      className={className}
    />
  );
}
